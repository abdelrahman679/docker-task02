global:
  scrape_interval: 15s

scrape_configs:
  - job_name: cadvisor

    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: backend

    static_configs:
      - targets:
          - backend1:80
          - backend2:80
          
  - job_name: mysql

    static_configs:
      - targets:
         - mysqld-exporter:9104
