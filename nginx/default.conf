upstream backend_pool {
    # Passive health checks: if a backend fails to respond (or errors out)
    # max_fails times within fail_timeout, nginx marks it unavailable for
    # fail_timeout seconds and routes new requests to the remaining backend.
    server backend1:80 max_fails=3 fail_timeout=10s;
    server backend2:80 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    # ---- Frontend (React dev server) ----
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        # Required for CRA hot-reload / websocket dev server
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Backend (Express API, load-balanced across backend1/backend2) ----
    # Trailing slash on proxy_pass strips the /api prefix before forwarding,
    # so /api/healthz -> backend_pool/healthz, /api/ -> backend_pool/
    location /api/ {
        proxy_pass http://backend_pool/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # If the upstream we picked is down/unreachable, retry the next
        # server in the pool automatically instead of failing the request.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_connect_timeout 3s;
    }
}
