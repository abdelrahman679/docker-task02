services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped

    ports:
    - "8081:8080"

    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker:/var/lib/docker:ro

    networks:
    - monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    networks:
      - monitoring

    depends_on:
      - cadvisor
   
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3001:3000"

    networks:
      - monitoring

    depends_on:
      - prometheus

    volumes:
      - grafana-data:/var/lib/grafana      
  nginx:
    image: nginx:1.27-alpine
    container_name: rproxy
    restart: unless-stopped
    ports:
      - "80:80"                # ONLY container exposed to the host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - front-tier
      - back-tier
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy   # backend's own HEALTHCHECK (healthcheck.js)
    read_only: true             # container fs is read-only
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cpus: "0.5"
    mem_limit: 128m
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"


  backend:
    build:
      args:
        - NODE_ENV=development
      context: backend
      target: development
    container_name: backendapp
    command: npm run start-watch
    restart: always
    environment:
      - DATABASE_DB=example
      - DATABASE_USER=root
      - DATABASE_PASSWORD=/run/secrets/db-password
      - DATABASE_HOST=db
      - NODE_ENV=development
    expose:
      - "80"                    # reachable inside the network only
    secrets:
      - db-password
    volumes:
      - ./backend/src:/code/src:ro
      - ./backend/package.json:/code/package.json
      - ./backend/package-lock.json:/code/package-lock.json
      - back-notused:/opt/app/node_modules
    networks:
      - back-tier                # nginx <-> backend
      - data-tier                # backend <-> db  
      - monitoring
      
    depends_on:
      db: 
        condition: service_healthy
    cpus: "0.5"
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    # We use a mariadb image which supports both amd64 & arm64 architecture
    image: mariadb:10.6
    container_name: dbapp
    # If you really want to use MySQL, uncomment the following line
    #image: mysql:8.0.27
    command: '--default-authentication-plugin=mysql_native_password'
    restart: always
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - data-tier                # isolated: unreachable from nginx & frontend
    environment:
      - MYSQL_DATABASE=example
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db-password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
    cpus: "0.5"
    mem_limit: 128m
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
          
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.14.0
    container_name: mysqld-exporter
    restart: unless-stopped

    environment:
      DATA_SOURCE_NAME: "exporter:exporter_password@(db:3306)/"

    expose:
      - "9104"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - data-tier
      - monitoring

  frontend:
    build:
      context: frontend
      target: development
    container_name: frontapp
    expose:
      - "3000"                   # reachable inside the network only
    volumes:
      - ./frontend/src:/code/src
      - /code/node_modules
    networks:
      - front-tier # nginx <-> frontend only
    restart: unless-stopped
    healthcheck:
     test: ["CMD","node","-e","require('http').get('http://localhost:3000',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
     interval: 10s
     timeout: 5s
     retries: 5
     start_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
     
    cpus: "0.5"
    mem_limit: 500m

networks:
  front-tier:      # nginx <-> frontend
  back-tier:       # nginx <-> backend
  data-tier:       # backend <-> db (fully isolated from the rest)
  monitoring:

volumes:
  back-notused:
  db-data:
  grafana-data:

secrets:
  db-password:
    file: db/password.txt
